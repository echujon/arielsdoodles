<html>

{{ partial "head" . }}

<body class="is-preload">

	{{ partial "navbar.html" .}}

	<!-- Wrapper -->
	<div id="wrapper" class="{{.Params.id}}-page divided">
		{{- block "main" . }}{{- end }}
		<!-- Wrapper -->
	</div>

	{{ if .Site.Params.enableShop }}
	<!-- Shopping Cart Modal -->
	{{ partial "cartModal" . }}
	{{ end }}

	{{ partial "scripts" . }}

	{{ if .Site.Params.enableShop }}
	<!-- Shopping Cart Script -->
	<script src="https://js.stripe.com/v3/" defer></script>
	<script>
		window.CART_WORKER_URL = '{{ .Site.Params.cartWorkerURL }}';
		window.STRIPE_PUBLISHABLE_KEY = '{{ .Site.Params.stripePublishableKey }}';
	</script>
	<script src="/js/cart.js" defer></script>
	{{ end }}

	<!-- Microsoft Clarity -->
	<script type="text/javascript">
		(function (c, l, a, r, i, t, y) {
			c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
			t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
			y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
		})(window, document, "clarity", "script", "hzkaepy7gy");
	</script>

	{{ partial "footer" . }}
</body>

</html>
